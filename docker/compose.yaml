services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: testpassword
      POSTGRES_DB: pgroles_test
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pgroles_test"]
      interval: 5s
      timeout: 5s
      retries: 10
