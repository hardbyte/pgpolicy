---
apiVersion: pgroles.io/v1alpha1
kind: PostgresPolicy
metadata:
  name: rotated-secret-policy
  namespace: default
spec:
  connection:
    secretRef:
      name: rotating-postgres-credentials
  interval: "5m"

  roles:
    - name: rotated-secret-user
      login: true
      comment: "Used to verify secret rotation recovery"
